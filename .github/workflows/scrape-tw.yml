name: Scrape TW Lottery Odds

on:
  workflow_dispatch: {}        # 手動觸發（結構分析期用這個）
  # schedule:                  # 解析器完成後再打開排程
  #   - cron: "*/15 * * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install deps + Chromium
        working-directory: scraper
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium
      - name: Run scraper
        working-directory: scraper
        env:
          WC_ADMIN_KEY: ${{ secrets.WC_ADMIN_KEY }}
        run: npm run scrape
      - name: Upload captured responses (analysis)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: captured-responses
          path: scraper/captured/
          if-no-files-found: ignore
          retention-days: 7
