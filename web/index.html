<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WC 2026 世界盃分析 — 台灣運彩主推</title>
  <meta name="description" content="2026 世界盃賽程、積分榜、AI 分析與台灣運彩玩法期望值。僅供參考，未滿18歲不得購買運動彩券。" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="brand">🏆 WC 2026</div>
    <nav>
      <button class="tab active" data-tab="home">⭐ 推薦</button>
      <button class="tab" data-tab="matches">⚽ 比分盤</button>
      <button class="tab" data-tab="standings">🥇 積分榜</button>
      <button class="tab" data-tab="analysis">🔮 AI分析</button>
      <button class="tab" data-tab="track">🏆 戰績</button>
      <button class="tab" data-tab="news">📰 新聞</button>
      <button class="tab" data-tab="teams">🌍 球隊</button>
    </nav>
  </header>

  <main>
    <section id="home" class="panel active">
      <div class="hero-head">
        <h2>⭐ 最新 AI 推薦</h2>
        <p class="muted">由五模型融合分析，信心指數最高的近期賽事。點卡片看完整分析。</p>
      </div>
      <div id="home-picks" class="picks-grid"><p class="muted">載入中…</p></div>
    </section>

    <section id="matches" class="panel">
      <div class="toolbar">
        <button class="filter active" data-filter="all">全部</button>
        <button class="filter" data-filter="today">今日（台灣時間）</button>
        <button class="filter" data-filter="upcoming">未開賽</button>
      </div>
      <div id="match-list" class="list"><p class="muted">載入中…</p></div>
    </section>

    <section id="standings" class="panel">
      <div id="standings-grid" class="grid"><p class="muted">載入中…</p></div>
    </section>

    <section id="analysis" class="panel">
      <div id="analysis-list" class="list"><p class="muted">載入中…</p></div>
    </section>

    <section id="track" class="panel">
      <div id="track-body"><p class="muted">載入中…</p></div>
    </section>

    <section id="news" class="panel">
      <div class="toolbar">
        <button class="nfilter active" data-ntag="worldcup">世界盃</button>
        <button class="nfilter" data-ntag="">全部足球</button>
      </div>
      <div id="news-list" class="list"><p class="muted">載入中…</p></div>
    </section>

    <section id="teams" class="panel">
      <input id="team-search" type="search" placeholder="搜尋球隊（中文或英文）…" />
      <div id="team-grid" class="grid"><p class="muted">載入中…</p></div>
    </section>
  </main>

  <footer>
    <p>⚠️ 本站僅提供分析資訊，不構成投注建議。未滿 18 歲不得購買運動彩券，請理性投注。</p>
    <p class="muted" id="last-sync"></p>
  </footer>

  <!-- 賽事詳情 / AI 分析彈窗 -->
  <div id="detail-overlay" class="overlay" hidden>
    <div class="overlay-box">
      <button id="detail-close" class="close">✕</button>
      <div id="detail-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
