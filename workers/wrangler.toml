# wrangler deploy 用設定
name = "wc2026-api"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# D1
[[d1_databases]]
binding = "DB"
database_name = "wc2026"
database_id = "cca9679a-7874-4f5b-b358-4a876d8c40e5"

# KV 熱快取
[[kv_namespaces]]
binding = "CACHE"
id = "05d7334de0c64860b035bca9cfe9da3d"

# 帳號 cron 上限 5 個 → 只用 1 個，每 5 分鐘觸發，程式內依分鐘數分派任務
[triggers]
crons = ["*/5 * * * *"]

# Secrets（用 `wrangler secret put <NAME>` 設定，不寫在這裡）：
#   OPENAI_API_KEY        — GPT（主）
#   ANTHROPIC_API_KEY     — Claude（fallback，可不設）
#   ODDS_API_KEY          — The Odds API
#   FOOTBALL_DATA_TOKEN   — football-data.org
#   TELEGRAM_BOT_TOKEN    — 推播
[vars]
# 優先序：Gemini（免費無限）→ GPT → Claude，前者失敗自動 fallback
LLM_PROVIDERS = "gemini:gemini-2.5-flash,gemini:gemini-3.5-flash,openai:gpt-4o-mini,anthropic:claude-haiku-4-5"
# OPENAI_BASE_URL 可改成任何 OpenAI 相容端點
